const NexStoriaConfig = {
  supabase: {
    url:     "https://lkeehgivbuhkwdfrvexm.supabase.co",
    anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZWVoZ2l2YnVoa3dkZnJ2ZXhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDg3OTIsImV4cCI6MjA4ODQ4NDc5Mn0.DgNMgoRjNOJK4uh-74lrpkMqM9_fiJi2j81RxQzNx3s",
  },
  cloudinary: {
    cloudName:    "dotejpjfv",
    uploadPreset: "nexstoria_unsigned",
  },
  emailWorker: {
    url: "https://nexstoria-email-worker.nexstoria.workers.dev",
  },
  app: {
    name:    "NexStoria",
    version: "1.0.0",
    env:     "production",
    baseUrl: "https://nexstoria.com",
  },
};

// ── Supabase Client (selamat dari race condition) ──
let DB = null;
function _initDB() {
  if (typeof window === 'undefined') return null;
  if (window.supabase && window.supabase.createClient) {
    return window.supabase.createClient(
      NexStoriaConfig.supabase.url,
      NexStoriaConfig.supabase.anonKey
    );
  }
  return null;
}
// Cuba init terus, kalau gagal retry bila DOMContentLoaded
DB = _initDB();
if (!DB) {
  document.addEventListener('DOMContentLoaded', function() {
    DB = _initDB();
    window.DB = DB;
  });
}

// ── Cloudinary Upload ──
async function uploadGambar(file, folder) {
  folder = folder || "nexstoria";
  var cloudName    = NexStoriaConfig.cloudinary.cloudName;
  var uploadPreset = NexStoriaConfig.cloudinary.uploadPreset;
  var formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);
  formData.append("folder", folder);
  try {
    var res  = await fetch("https://api.cloudinary.com/v1_1/" + cloudName + "/image/upload", { method: "POST", body: formData });
    var data = await res.json();
    if (data.secure_url) return data.secure_url;
    console.error("Upload gagal:", data);
    return null;
  } catch(err) {
    console.error("Cloudinary error:", err);
    return null;
  }
}

// ── Email Helpers (via Cloudflare Worker) ──
var Email = {
  sendVerification: function(to, name, verificationUrl) {
    return _callEmailWorker("/send-verification", { to: to, name: name, verificationUrl: verificationUrl });
  },
  sendWelcome: function(to, name) {
    return _callEmailWorker("/send-welcome", { to: to, name: name });
  },
  sendResetPassword: function(to, name, resetUrl) {
    return _callEmailWorker("/send-reset-password", { to: to, name: name, resetUrl: resetUrl });
  }
};

async function _callEmailWorker(endpoint, payload) {
  var url = NexStoriaConfig.emailWorker.url;
  try {
    var res  = await fetch(url + endpoint, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    });
    var data = await res.json();
    if (!res.ok) {
      console.error("Email gagal [" + endpoint + "]:", data.error);
      return { success: false, error: data.error };
    }
    return { success: true, id: data.id };
  } catch(err) {
    console.error("Email Worker error:", err);
    return { success: false, error: "Gagal sambung ke email server." };
  }
}

// ── Expose globals ──
window.NexStoriaConfig = NexStoriaConfig;
window.DB              = DB;
window.uploadGambar    = uploadGambar;
window.Email           = Email;

</script>

<style>
:root{
  --gold:#ffd166;--gold2:#f59e0b;

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--off);color:var(--ink);overflow-x:hidden;min-height:100vh;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;height:58px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(15,15,30,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(167,139,250,0.15);box-shadow:0 4px 24px rgba(0,0,0,0.25);}
.nav-logo{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:4px;}
.nav-logo em{color:var(--purple);font-style:normal;}
.nav-back{font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;padding:7px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.65);cursor:pointer;text-decoration:none;transition:all 0.2s;}
.nav-back:hover{border-color:var(--purple);color:var(--purple);}

/* ── BANNER ── */
.banner{height:200px;background:linear-gradient(135deg,#0f0f1e 0%,#2d1b69 45%,#1e1b4b 75%,#0f0f1e 100%);position:relative;overflow:hidden;}
.banner-particle{position:absolute;border-radius:50%;animation:drift 7s ease-in-out infinite;pointer-events:none;opacity:0.6;}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0);opacity:0.45;}50%{transform:translateY(-16px) rotate(180deg);opacity:0.9;}}
.banner-star{position:absolute;width:3px;height:3px;border-radius:50%;background:white;animation:twinkle 3s ease-in-out infinite;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:0.9;transform:scale(1.4);}}
.banner-label{position:absolute;bottom:14px;left:1.5rem;font-size:0.72rem;font-weight:800;color:rgba(255,255,255,0.35);letter-spacing:0.5px;text-transform:uppercase;}

/* ── LAYOUT ── */
.page-wrap{max-width:960px;margin:0 auto;padding:0 1.25rem 5rem;}

/* ── PROFILE CARD ── */
.profile-card{background:white;border-radius:22px;padding:0 1.75rem 1.75rem;margin-top:-64px;position:relative;z-index:2;margin-bottom:1.5rem;border:1.5px solid rgba(167,139,250,0.2);box-shadow:0 8px 48px rgba(124,58,237,0.1);}
.avatar-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem;}
.avatar-wrap{margin-top:-42px;position:relative;}
.avatar-box{width:110px;height:110px;border-radius:26px;display:flex;align-items:center;justify-content:center;font-size:3.2rem;border:4px solid white;box-shadow:0 8px 28px rgba(124,58,237,0.22);position:relative;overflow:hidden;background:linear-gradient(135deg,#e9d5ff,#c4b5fd,#a78bfa);}

.avatar-crown{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:1.3rem;}

.book-stat span{font-family:'Baloo 2',cursive;font-size:0.9rem;font-weight:800;color:var(--ink);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:3.5rem 1.5rem;color:var(--muted);}
.empty-state-icon{font-size:3rem;margin-bottom:0.75rem;}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,#f0f0f7 25%,#e8e8f0 50%,#f0f0f7 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── NOT FOUND ── */
.not-found{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:12px;}

.nf-btn{display:inline-block;margin-top:0.5rem;padding:10px 22px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:white;font-weight:800;font-size:0.85rem;text-decoration:none;transition:all 0.2s;}

/* ── RESPONSIVE ── */

  .book-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .book-cover{height:88px;font-size:2.4rem;}
}
</style>

<script>
const SUPABASE_URL = NexStoriaConfig.supabase.url;
const SUPABASE_KEY = NexStoriaConfig.supabase.anonKey;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CAT_COLORS = {
  'Haiwan':'linear-gradient(135deg,#d1fae5,#6ee7b7)',
  'Sains':'linear-gradient(135deg,#bfdbfe,#93c5fd)',
  'Dongeng':'linear-gradient(135deg,#ede9fe,#c4b5fd)',
  'Teladan':'linear-gradient(135deg,#fef3c7,#fde68a)',
  'Misteri':'linear-gradient(135deg,#e9d5ff,#ddd6fe)',
  'Wira':'linear-gradient(135deg,#fce7f3,#fbcfe8)',
  'Alam':'linear-gradient(135deg,#ccfbf1,#99f6e4)',
};

const CAT_EMOJIS = {
  'Haiwan':'🦁','Sains':'🚀','Dongeng':'🐉',
  'Teladan':'🕌','Misteri':'🧩','Wira':'🛡️','Alam':'🌿',
};

let authorId = null;
let currentUser = null;
let isFollowing = false;

// ── INIT ──
(async () => {
  // Spawn banner particles
  spawnParticles();

  // Get author ID from URL param
  const params = new URLSearchParams(window.location.search);
  authorId = params.get('id');

  if (!authorId) { showNotFound(); return; }

  // Get current session (optional — for follow button)
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;

  // Load author profile + books in parallel
  await Promise.all([
    loadProfile(),
    loadBooks(),
  ]);

  // Check follow state after profile loads
  if (currentUser) checkFollowState();
})();

// ── LOAD PROFILE ──
async function loadProfile() {
  const { data: p, error } = await sb.from('profiles')
    .select('id, full_name, username, pen_name, writer_bio, bio, stars_received, total_stories, avatar_url, avatar_emoji, role')
    .eq('id', authorId)
    .single();

  // Hanya tunjuk not found jika ID betul-betul tiada dalam DB
  if (error || !p) {
    console.warn('Profile not found:', error);
    showNotFound(); return;
  }

  // Display name: pen_name > full_name > username
  const displayName = p.pen_name || p.full_name || p.username || 'Penulis';
  const handle = p.username ? '@' + p.username : '';

  document.title = displayName + ' — NexStoria';
  document.getElementById('display-name').textContent = displayName;
  document.getElementById('profile-handle').textContent = handle;

  // Bio (writer_bio takes priority over generic bio)
  const bio = p.writer_bio || p.bio || '';
  if (bio) {
    const bioEl = document.getElementById('profile-bio');
    bioEl.textContent = bio;
    bioEl.style.display = 'block';
  }

  // Avatar
  const avatarBox = document.getElementById('avatar-box');
  if (p.avatar_url) {
    avatarBox.innerHTML = `<img src="${p.avatar_url}" alt="${displayName}">`;
  } else {
    avatarBox.innerHTML = `<span id="avatar-emoji" style="font-size:3.2rem;">${p.avatar_emoji || '✍️'}</span>`;
  }

  // Stats — reads & followers need separate queries
  document.getElementById('stat-stars').textContent = fmt(p.stars_received || 0);
  document.getElementById('stat-books').textContent = fmt(p.total_stories || 0);

  // Followers count
  const { count: followersCount } = await sb.from('follows')
    .select('id', { count:'exact', head:true }).eq('following_id', authorId);
  document.getElementById('stat-followers').textContent = fmt(followersCount || 0);

  // Show main content
  document.getElementById('not-found').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

// ── LOAD BOOKS ──
async function loadBooks() {
  const { data: stories, error } = await sb.from('stories')
    .select('id, title, synopsis, category, age_group, reads_count, stars_count, emoji, cover_url, cover_emoji, cover_bg, status, total_chapters')
    .eq('author_id', authorId)
    .in('status', ['published', 'approved', 'active'])
    .order('reads_count', { ascending: false });

  // Jika query dengan status filter gagal, cuba tanpa filter
  let finalStories = stories;
  if (error || !stories?.length) {
    const { data: all } = await sb.from('stories')
      .select('id, title, synopsis, category, age_group, reads_count, stars_count, emoji, cover_url, cover_emoji, cover_bg, status, total_chapters')
      .eq('author_id', authorId)
      .order('reads_count', { ascending: false });
    finalStories = all;
  }

  const grid = document.getElementById('book-grid');

  if (!finalStories || !finalStories.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-msg">Penulis ini belum menerbitkan cerita lagi.</div>
      </div>`;
    document.getElementById('book-count').textContent = '0 cerita';
    document.getElementById('stat-reads').textContent = '0';
    return;
  }

  // Update total reads stat
  const totalReads = finalStories.reduce((s, r) => s + (r.reads_count || 0), 0);
  document.getElementById('stat-reads').textContent = fmt(totalReads);
  document.getElementById('stat-books').textContent = fmt(finalStories.length);
  document.getElementById('book-count').textContent = finalStories.length + ' cerita';

  grid.innerHTML = finalStories.map(s => {
    const catBg = CAT_COLORS[s.category] || 'linear-gradient(135deg,#f0f9ff,#e0f2fe)';
    const coverHtml = s.cover_url
      ? `<img class="book-cover-img" src="${s.cover_url}" alt="${s.title}" loading="lazy"><span class="book-cover-emoji" style="opacity:0;">${s.emoji||s.cover_emoji||'📖'}</span>`
      : `<span class="book-cover-emoji">${s.emoji || s.cover_emoji || CAT_EMOJIS[s.category] || '📖'}</span>`;

    return `
      <a class="book-card" href="nexstoria-reader.html?id=${s.id}" title="${s.title}">
        <div class="book-cover" style="background:${s.cover_bg || catBg};">
          ${coverHtml}
        </div>
        <div class="book-body">
          <div class="book-category">${s.category || 'Umum'}</div>
          <div class="book-title">${s.title}</div>
          ${s.synopsis ? `<div class="book-synopsis">${s.synopsis}</div>` : ''}
          <div class="book-meta">
            <span class="book-meta-chip">🎯 ${s.age_group || '—'} thn</span>
            ${s.total_chapters ? `<span class="book-meta-chip">📖 ${s.total_chapters} bab</span>` : ''}
          </div>
          <div class="book-stats">
            <div class="book-stat">👁 <span>${fmt(s.reads_count || 0)}</span></div>
            <div class="book-stat">⭐ <span>${fmt(s.stars_count || 0)}</span></div>
          </div>
        </div>
      </a>`;
  }).join('');
}

// ── FOLLOW ──
async function checkFollowState() {
  if (!currentUser || !authorId || currentUser.id === authorId) {
    // Hide follow button if viewing own profile
    if (currentUser?.id === authorId) document.getElementById('follow-btn').style.display = 'none';
    return;
  }
  const { data } = await sb.from('follows')
    .select('id').eq('follower_id', currentUser.id).eq('following_id', authorId).maybeSingle();
  isFollowing = !!data;
  updateFollowBtn();
}

function updateFollowBtn() {
  const btn = document.getElementById('follow-btn');
  const icon = document.getElementById('follow-icon');
  const label = document.getElementById('follow-label');
  if (isFollowing) {
    btn.className = 'follow-btn following';
    icon.textContent = '✓';
    label.textContent = 'Diikuti';
  } else {
    btn.className = 'follow-btn default';
    icon.textContent = '➕';
    label.textContent = 'Ikuti Penulis';
  }
}

async function toggleFollow() {
  if (!currentUser) {
    showToast('🔑 Sila log masuk untuk mengikuti penulis.');
    setTimeout(() => window.location.href = 'nexstoria-login.html?redirect=' + encodeURIComponent(location.href), 1400);
    return;
  }
  if (currentUser.id === authorId) return;

  const btn = document.getElementById('follow-btn');
  btn.disabled = true;

  try {
    if (isFollowing) {
      await sb.from('follows').delete()
        .eq('follower_id', currentUser.id).eq('following_id', authorId);
      isFollowing = false;
      showToast('👋 Anda tidak lagi mengikuti penulis ini.');
    } else {
      await sb.from('follows').insert({ follower_id: currentUser.id, following_id: authorId });
      isFollowing = true;
      showToast('✅ Anda kini mengikuti penulis ini!');
      // Notify the author
      await sb.from('notifications').insert({
        user_id: authorId,
        type: 'announcement',
        message: '🎉 Seseorang baru mula mengikuti anda di NexStoria!',
        is_read: false,
      }).single().catch(() => {});
    }
    updateFollowBtn();
    // Update displayed followers count
    const { count } = await sb.from('follows').select('id', { count:'exact', head:true }).eq('following_id', authorId);
    document.getElementById('stat-followers').textContent = fmt(count || 0);
  } catch(e) {
    showToast('❌ Gagal. Cuba lagi.');
  }
  btn.disabled = false;
}

// ── HELPERS ──
function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'j';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n || 0);
}

function showNotFound() {
  document.getElementById('banner').style.display = 'none';
  document.getElementById('not-found').style.display = 'flex';
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

function spawnParticles() {
  const banner = document.getElementById('banner');
  const shapes = ['#a78bfa','#ffd166','#06d6a0','#ff6b6b','#38bdf8'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'banner-particle';
    const size = 6 + Math.random() * 28;
    el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${shapes[i%shapes.length]};opacity:${0.12+Math.random()*0.22};animation-delay:${Math.random()*4}s;animation-duration:${5+Math.random()*4}s;`;
    banner.appendChild(el);
  }
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'banner-star';
    el.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    banner.appendChild(el);
  }
}
</script>
